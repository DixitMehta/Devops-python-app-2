apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: python-app-ingress
    namespace: devops-demo

spec:
    rules:
    # - host: python-app.local
    - http:
        paths:
           - path: /
             pathType: Prefix
             backend: 
                service:
                    name: python-app
                    port:
                        number: 80

