apiVersion: apps/v1
kind: Deployment
metadata:
    name: python-app
    # namespace: devops-demo
spec:
    replicas: 2
    selector: 
        matchLabels:
            app: python-app
    template: 
        metadata:
            labels:
                app: python-app
        spec:
            containers:
            - name: app
              image: studydocs/devops-python-app:84
              imagePullPolicy: Always  
              ports:
              - containerPort: 5000
              envFrom:
              - configMapRef:
                    name: app-config
              - secretRef:
                    name: db-secret
